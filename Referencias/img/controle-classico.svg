<svg viewBox="0 0 480 320" xmlns="http://www.w3.org/2000/svg">
  <rect width="480" height="320" fill="#E7EEFA"/>
  <!-- axes -->
  <g stroke="#5A6472" stroke-width="3" stroke-linecap="round">
    <line x1="60" y1="160" x2="420" y2="160"/>
    <line x1="240" y1="40" x2="240" y2="280"/>
  </g>
  <path d="M420 160 l-14 -8 v16 z" fill="#5A6472"/>
  <path d="M240 40 l-8 14 h16 z" fill="#5A6472"/>
  <text x="428" y="150" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#5A6472">&#963;</text>
  <text x="246" y="52" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#5A6472">j&#969;</text>
  <!-- open loop poles on real axis -->
  <g stroke="#002C6F" stroke-width="6" stroke-linecap="round">
    <path d="M150 150 l20 20 M170 150 l-20 20"/>
    <path d="M230 150 l20 20 M250 150 l-20 20"/>
  </g>
  <!-- root locus branches -->
  <g fill="none" stroke="#002C6F" stroke-width="6" stroke-linecap="round">
    <path d="M160 160 H240"/>
    <path d="M200 160 C 200 100, 260 90, 300 110"/>
    <path d="M200 160 C 200 220, 260 230, 300 210"/>
  </g>
  <!-- closed loop poles (design points) -->
  <circle cx="280" cy="103" r="8" fill="#E4002B"/>
  <circle cx="280" cy="217" r="8" fill="#E4002B"/>
  <!-- breakaway point -->
  <circle cx="200" cy="160" r="5" fill="#002C6F"/>
</svg>
